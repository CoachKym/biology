<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Physics — Mock Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #03060f;
    --bg-mid: #0a1228;
    --bg-card: #0f1a3a;
    --bg-card-hi: #16244d;
    --cyan: #00e5ff;
    --cyan-soft: #6ff0ff;
    --cyan-glow: rgba(0, 229, 255, 0.35);
    --gold: #ffd86b;
    --crimson: #ff4d6d;
    --green: #4dffb0;
    --text: #e8f1ff;
    --text-dim: #8aa3c7;
    --border: rgba(0, 229, 255, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield backdrop */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(2px 2px at 20% 30%, white, transparent),
      radial-gradient(1px 1px at 60% 70%, white, transparent),
      radial-gradient(1.5px 1.5px at 80% 20%, var(--cyan-soft), transparent),
      radial-gradient(1px 1px at 35% 85%, white, transparent),
      radial-gradient(2px 2px at 90% 60%, var(--cyan-soft), transparent),
      radial-gradient(1px 1px at 10% 50%, white, transparent),
      radial-gradient(1.5px 1.5px at 50% 10%, white, transparent),
      radial-gradient(1px 1px at 75% 90%, var(--cyan-soft), transparent),
      radial-gradient(ellipse at 50% 50%, var(--bg-mid) 0%, var(--bg-deep) 70%);
    background-size: 100% 100%;
    z-index: -1;
    opacity: 0.7;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(0, 229, 255, 0.08), transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255, 77, 109, 0.06), transparent 50%);
    pointer-events: none;
    z-index: -1;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px 16px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--cyan-soft);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { background: var(--bg-card); border-color: var(--cyan); }

  .subject-tag {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 0.15em;
    font-size: 0.85rem;
    text-shadow: 0 0 12px var(--cyan-glow);
  }

  /* ===== SCREENS ===== */
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  /* ===== HOME SCREEN ===== */
  .home-hero {
    text-align: center;
    padding: 24px 8px 32px;
  }

  .home-hero h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 7vw, 3rem);
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 24px var(--cyan-glow), 0 0 4px white;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .home-hero .tagline {
    color: var(--text-dim);
    font-size: 1rem;
    font-weight: 500;
  }

  .rounds-grid {
    display: grid;
    gap: 14px;
    padding: 8px 0 24px;
  }

  .round-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-hi) 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .round-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--cyan-glow), transparent);
    transition: left 0.6s;
  }

  .round-card:hover {
    border-color: var(--cyan);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 229, 255, 0.15);
  }
  .round-card:hover::before { left: 100%; }

  .round-card.boss {
    background: linear-gradient(135deg, #2a0a1a 0%, #1a0530 100%);
    border-color: var(--crimson);
  }
  .round-card.boss:hover {
    border-color: var(--gold);
    box-shadow: 0 8px 24px rgba(255, 77, 109, 0.25);
  }

  .round-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .round-title {
    font-family: 'Cinzel', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--cyan-soft);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .round-card.boss .round-title { color: var(--gold); }

  .round-meta {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .round-desc {
    color: var(--text-dim);
    font-size: 0.92rem;
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .round-stats {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 0.85rem;
  }

  .stat-pill {
    background: rgba(0, 229, 255, 0.1);
    color: var(--cyan-soft);
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
  }
  .round-card.boss .stat-pill {
    background: rgba(255, 216, 107, 0.12);
    color: var(--gold);
  }

  .best-score {
    color: var(--gold);
    font-weight: 700;
    font-size: 0.85rem;
  }

  /* ===== QUIZ SCREEN ===== */
  .quiz-header {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .quiz-round-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--cyan-soft);
    font-weight: 700;
  }

  .quiz-progress {
    color: var(--text-dim);
    font-size: 0.9rem;
    font-weight: 600;
  }

  .progress-bar {
    height: 4px;
    background: var(--bg-card);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 18px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--cyan-soft));
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--cyan-glow);
  }

  .question-card {
    background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-mid) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
  }

  .question-text {
    font-size: 1.08rem;
    line-height: 1.5;
    margin-bottom: 18px;
    font-weight: 500;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    background: var(--bg-mid);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    border-radius: 10px;
    text-align: left;
    font-family: inherit;
    font-size: 0.98rem;
    cursor: pointer;
    transition: all 0.18s;
    line-height: 1.4;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option:hover:not(:disabled) {
    border-color: var(--cyan);
    background: var(--bg-card-hi);
    transform: translateX(2px);
  }

  .option-letter {
    background: var(--bg-deep);
    color: var(--cyan-soft);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-family: 'Cinzel', serif;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .option:disabled { cursor: default; }

  .option.correct {
    border-color: var(--green);
    background: rgba(77, 255, 176, 0.12);
    color: var(--green);
  }
  .option.correct .option-letter {
    background: var(--green);
    color: var(--bg-deep);
    border-color: var(--green);
  }

  .option.wrong {
    border-color: var(--crimson);
    background: rgba(255, 77, 109, 0.12);
    color: var(--crimson);
  }
  .option.wrong .option-letter {
    background: var(--crimson);
    color: white;
    border-color: var(--crimson);
  }

  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 10px;
    border-left: 3px solid var(--cyan);
    background: rgba(0, 229, 255, 0.06);
    font-size: 0.95rem;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; animation: slideIn 0.3s ease; }
  .feedback.correct { border-left-color: var(--green); background: rgba(77, 255, 176, 0.06); }
  .feedback.wrong { border-left-color: var(--crimson); background: rgba(255, 77, 109, 0.06); }

  .feedback-title {
    font-weight: 700;
    margin-bottom: 4px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.03em;
  }
  .feedback.correct .feedback-title { color: var(--green); }
  .feedback.wrong .feedback-title { color: var(--crimson); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .next-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan-soft) 100%);
    color: var(--bg-deep);
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 14px var(--cyan-glow);
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px var(--cyan-glow); }

  /* ===== RESULTS SCREEN ===== */
  .results-card {
    background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-mid) 100%);
    border: 1px solid var(--cyan);
    border-radius: 18px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 0 40px var(--cyan-glow);
  }

  .results-title {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    color: var(--cyan);
    margin-bottom: 8px;
    font-weight: 900;
    letter-spacing: 0.05em;
  }

  .results-round {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 24px;
  }

  .score-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 0 auto 20px;
    background: var(--bg-deep);
    border: 4px solid var(--cyan);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px var(--cyan-glow), inset 0 0 20px rgba(0, 229, 255, 0.1);
  }
  .score-num {
    font-family: 'Cinzel', serif;
    font-size: 3rem;
    color: var(--cyan-soft);
    font-weight: 900;
    line-height: 1;
  }
  .score-total {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .score-message {
    font-size: 1.05rem;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .score-sub {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }

  .new-best {
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-weight: 700;
    margin-bottom: 16px;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-shadow: 0 0 12px rgba(255, 216, 107, 0.4);
  }

  .results-actions {
    display: flex;
    gap: 10px;
    flex-direction: column;
  }

  .btn {
    padding: 13px 18px;
    border-radius: 10px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.04em;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan-soft) 100%);
    color: var(--bg-deep);
    box-shadow: 0 4px 14px var(--cyan-glow);
  }
  .btn-primary:hover { transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    color: var(--cyan-soft);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg-card-hi); border-color: var(--cyan); }

  /* small touches */
  @media (max-width: 480px) {
    .home-hero h1 { font-size: 2rem; }
    .question-card { padding: 18px; }
    .question-text { font-size: 1rem; }
    .option { font-size: 0.94rem; padding: 12px 14px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="index.html" class="back-btn">← Mock Mode</a>
    <span class="subject-tag">PHYSICS</span>
  </div>

  <!-- HOME SCREEN -->
  <div class="screen active" id="home-screen">
    <div class="home-hero">
      <h1>PHYSICS</h1>
      <p class="tagline">Pick your battle. Eyes up.</p>
    </div>
    <div class="rounds-grid" id="rounds-grid"></div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quiz-screen">
    <div class="quiz-header">
      <span class="quiz-round-name" id="quiz-round-name"></span>
      <span class="quiz-progress" id="quiz-progress"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-card">
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="feedback-title"></div>
        <div id="feedback-text"></div>
      </div>
    </div>
    <button class="next-btn" id="next-btn">NEXT →</button>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="results-screen">
    <div class="results-card">
      <div class="results-title" id="results-title">ROUND COMPLETE</div>
      <div class="results-round" id="results-round-name"></div>
      <div class="score-circle">
        <div class="score-num" id="score-num">0</div>
        <div class="score-total" id="score-total">/ 0</div>
      </div>
      <div class="new-best" id="new-best" style="display:none;">⚡ NEW BEST ⚡</div>
      <div class="score-message" id="score-message"></div>
      <div class="score-sub" id="score-sub"></div>
      <div class="results-actions">
        <button class="btn btn-primary" id="play-again-btn">PLAY AGAIN</button>
        <button class="btn btn-secondary" id="back-home-btn">CHOOSE ANOTHER ROUND</button>
      </div>
    </div>
  </div>

</div>

<script>
/* PHYSICS QUESTION BANK — All options balanced for equal length */

const QUESTION_BANK = {
  lightspeed: [
    {
      q: "A cyclist travels 150 m in 10 seconds. What is their average speed?",
      options: ["1.5 m/s", "15 m/s", "150 m/s", "0.15 m/s"],
      correct: 1,
      explain: "Speed = distance ÷ time = 150 ÷ 10 = 15 m/s. Watch the decimal place — easy slip."
    },
    {
      q: "What does the GRADIENT of a velocity-time graph tell you?",
      options: ["The distance travelled", "The acceleration", "The average speed", "The time elapsed"],
      correct: 1,
      explain: "Gradient of v-t graph = acceleration. Locked in. Area under it = distance. Memorise both as a pair."
    },
    {
      q: "What does the AREA UNDER a velocity-time graph tell you?",
      options: ["The acceleration", "The average speed", "The distance travelled", "The resultant force"],
      correct: 2,
      explain: "Area under v-t = distance. Gradient = acceleration. Two facts, one graph — never mix them up."
    },
    {
      q: "On a distance-time graph, a HORIZONTAL flat line means the object is...",
      options: ["moving at constant speed", "accelerating forwards", "stationary and not moving", "gradually slowing down"],
      correct: 2,
      explain: "Flat line on d-t = no distance change = stopped. On a v-t graph it would mean constant speed instead."
    },
    {
      q: "On a velocity-time graph, a HORIZONTAL flat line means the object is...",
      options: ["completely stationary", "moving at constant velocity", "accelerating uniformly", "decelerating steadily"],
      correct: 1,
      explain: "Flat on v-t = velocity isn't changing = constant speed. Different graph, different meaning. This is the trap."
    },
    {
      q: "A car accelerates from 5 m/s to 25 m/s in 4 seconds. What is its acceleration?",
      options: ["5 m/s²", "20 m/s²", "30 m/s²", "100 m/s²"],
      correct: 0,
      explain: "a = (v − u) ÷ t = (25 − 5) ÷ 4 = 20 ÷ 4 = 5 m/s². Subtract first, then divide."
    },
    {
      q: "You're given: initial speed, final speed, and distance — but NO time. Which equation do you reach for?",
      options: ["v = u + at", "v² = u² + 2as", "F = m × a", "s = ½(u+v)t"],
      correct: 1,
      explain: "No time? Use v² = u² + 2as. The big tell: there's no 't' in this equation. That's literally why it exists."
    },
    {
      q: "An object is dropped and falls 5 m. Using v² = u² + 2as with g = 10 m/s², what is its final speed?",
      options: ["5 m/s", "10 m/s", "50 m/s", "100 m/s"],
      correct: 1,
      explain: "u = 0 (dropped), a = 10, s = 5. So v² = 0 + 2×10×5 = 100. v = √100 = 10 m/s. Don't forget the square root!"
    },
    {
      q: "Look at a v-t graph: line starts at the origin and rises in a straight line. What's happening?",
      options: ["moving at constant velocity", "accelerating steadily from rest", "decelerating from top speed", "remaining stationary at rest"],
      correct: 1,
      explain: "Straight rising line on v-t = constant (steady) acceleration. Starts at origin = started from rest."
    },
    {
      q: "On a v-t graph, the line CURVES upward, getting steeper. This means...",
      options: ["acceleration stays constant", "acceleration is increasing", "acceleration is decreasing", "velocity stays constant"],
      correct: 1,
      explain: "Steeper gradient = bigger acceleration. Curve getting steeper = acceleration growing. Curve flattening = acceleration shrinking."
    },
    {
      q: "Which of these is a VECTOR quantity?",
      options: ["Speed", "Distance", "Velocity", "Time"],
      correct: 2,
      explain: "Vectors have size AND direction. Velocity = speed + direction. Speed alone is a scalar. Same for distance vs displacement."
    },
    {
      q: "A car travels at constant 20 m/s for 30 seconds. What distance does it cover?",
      options: ["50 m", "600 m", "1.5 m", "10 m"],
      correct: 1,
      explain: "Distance = speed × time = 20 × 30 = 600 m. Constant speed means no equation gymnastics needed."
    },
    {
      q: "How do you calculate acceleration from a velocity-time graph?",
      options: ["read the y-axis intercept value", "find the area under the line", "calculate the gradient of the line", "multiply the velocity by the time"],
      correct: 2,
      explain: "Acceleration = gradient of v-t graph = (change in velocity) ÷ (change in time). Pick two clear points, do the maths."
    },
    {
      q: "How do you calculate distance travelled from a velocity-time graph?",
      options: ["find the gradient of the line", "find the area under the line", "read the peak velocity value", "divide the gradient by time"],
      correct: 1,
      explain: "Distance = area under v-t. Triangle? ½ × base × height. Rectangle? base × height. Weird shape? Split it up."
    },
    {
      q: "A ball falls from rest. After 2 seconds (g = 10 m/s²), what's its speed?",
      options: ["5 m/s", "10 m/s", "20 m/s", "40 m/s"],
      correct: 2,
      explain: "v = u + at = 0 + 10×2 = 20 m/s. From rest means u = 0. Free fall on Earth ≈ 10 m/s² (or 9.8 if being fussy)."
    },
    {
      q: "You need to find DISTANCE and you're given initial velocity, time, and acceleration. Which equation works?",
      options: ["v = u + at", "F = m × a", "s = ut + ½at²", "v² = u² + 2as"],
      correct: 2,
      explain: "Got u, a, t and need s? Use s = ut + ½at². The other distance equation (v²=u²+2as) needs final velocity, which you don't have here."
    },
    {
      q: "Which is the correct equation for acceleration?",
      options: ["a = (v − u) × t", "a = (v − u) ÷ t", "a = u + v × t", "a = v² − u²"],
      correct: 1,
      explain: "Acceleration = change in velocity ÷ time taken = (v − u) ÷ t. Final minus initial, divided by time. Locked in."
    },
    {
      q: "On a d-t graph, a STEEPER line means the object is...",
      options: ["moving more slowly", "moving more quickly", "completely stopped", "going in reverse"],
      correct: 1,
      explain: "Steeper slope on d-t = covering more distance per second = faster. Gentle slope = slow. Flat = stopped."
    }
  ],

  gravity_well: [
    {
      q: "What is the equation for force?",
      options: ["F = m + a", "F = m × a", "F = m ÷ a", "F = a ÷ m"],
      correct: 1,
      explain: "Force = mass × acceleration. F = ma. The classic. Newton's second law in 5 characters."
    },
    {
      q: "What is the equation for weight?",
      options: ["W = m × g", "W = m ÷ g", "W = m + g", "W = m − g"],
      correct: 0,
      explain: "Weight = mass × gravitational field strength. W = mg. On Earth, g ≈ 10 N/kg. So a 5 kg bag weighs 50 N."
    },
    {
      q: "A 60 kg person stands on Earth where g = 10 N/kg. What is their weight?",

/* ==========================================================
   ROUND LOGIC
   ========================================================== */
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getQuestionsForRound(round) {
  if (round.pool === 'all') {
    const all = [];
    Object.values(QUESTION_BANK).forEach(arr => all.push(...arr));
    return shuffleArray(all).slice(0, round.questionsPerRound);
  }
  const pool = QUESTION_BANK[round.pool] || [];
  return shuffleArray(pool).slice(0, round.questionsPerRound);
}

function startRound(round) {
  state.currentRound = round;
  state.questions = getQuestionsForRound(round);
  state.qIndex = 0;
  state.score = 0;
  state.answered = false;
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.qIndex];
  document.getElementById('quiz-round-name').textContent = `${state.currentRound.icon} ${state.currentRound.title}`;
  document.getElementById('quiz-progress').textContent = `${state.qIndex + 1} / ${state.questions.length}`;
  document.getElementById('progress-fill').style.width = `${((state.qIndex) / state.questions.length) * 100}%`;
  document.getElementById('question-text').textContent = q.q;

  // Shuffle option order so correct answer lands in a random slot each time
  const indices = [0, 1, 2, 3];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  state.shuffledCorrect = indices.indexOf(q.correct);

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  indices.forEach((origIdx, displayIdx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[displayIdx]}</span><span>${q.options[origIdx]}</span>`;
    btn.addEventListener('click', () => handleAnswer(displayIdx, btn));
    optionsEl.appendChild(btn);
  });

  document.getElementById('feedback').classList.remove('show', 'correct', 'wrong');
  document.getElementById('next-btn').classList.remove('show');
  state.answered = false;
}

function handleAnswer(choice, btnEl) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.qIndex];
  const correctIdx = state.shuffledCorrect;
  const correct = choice === correctIdx;
  const allButtons = document.querySelectorAll('.option');

  allButtons.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct');
    else if (i === choice) b.classList.add('wrong');
  });

  const feedback = document.getElementById('feedback');
  const feedbackTitle = document.getElementById('feedback-title');
  const feedbackText = document.getElementById('feedback-text');

  if (correct) {
    state.score++;
    feedbackTitle.textContent = '✓ NAILED IT';
    feedback.classList.add('correct');
  } else {
    feedbackTitle.textContent = '✗ NOT QUITE';
    feedback.classList.add('wrong');
  }
  feedbackText.textContent = q.explain;
  feedback.classList.add('show');

  document.getElementById('progress-fill').style.width = `${((state.qIndex + 1) / state.questions.length) * 100}%`;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = state.qIndex === state.questions.length - 1 ? 'SEE RESULTS →' : 'NEXT →';
  nextBtn.classList.add('show');
}

document.getElementById('next-btn').addEventListener('click', () => {
  state.qIndex++;
  if (state.qIndex >= state.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
});

/* ==========================================================
   RESULTS SCREEN
   ========================================================== */
function showResults() {
  showScreen('results-screen');
  const total = state.questions.length;
  const score = state.score;
  const pct = (score / total) * 100;

  document.getElementById('results-round-name').textContent = `${state.currentRound.icon} ${state.currentRound.title}`;
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-total').textContent = `/ ${total}`;

  // Score messages — encouraging, never anxiety-inducing
  let msg, sub;
  if (pct === 100) { msg = '⚡ FLAWLESS VICTORY ⚡'; sub = 'You went full god-mode. Untouchable.'; }
  else if (pct >= 80) { msg = '🔥 ABSOLUTELY COOKING'; sub = 'That was clean. Run it back to lock it in.'; }
  else if (pct >= 60) { msg = '💪 SOLID RUN'; sub = 'Strong base. A few wobbles — those are gold for revision.'; }
  else if (pct >= 40) { msg = '🎯 GETTING THERE'; sub = 'Not bad at all. The misses are exactly what to study next.'; }
  else { msg = '🚀 EARLY DAYS'; sub = 'No stress. Every wrong answer just turned into a study tip. Go again.'; }

  document.getElementById('score-message').textContent = msg;
  document.getElementById('score-sub').textContent = sub;

  // Best score check
  const scores = loadScores();
  const oldBest = scores[state.currentRound.id] || 0;
  const newBestEl = document.getElementById('new-best');
  if (score > oldBest) {
    scores[state.currentRound.id] = score;
    saveScores(scores);
    newBestEl.style.display = 'block';
  } else {
    newBestEl.style.display = 'none';
  }
}

document.getElementById('play-again-btn').addEventListener('click', () => {
  startRound(state.currentRound);
});
document.getElementById('back-home-btn').addEventListener('click', () => {
  showScreen('home-screen');
  renderHome();
});

/* ==========================================================
   SCREEN ROUTER
   ========================================================== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// Initial render
renderHome();
</script>
</body>
</html>
