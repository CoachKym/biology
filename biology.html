<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biology">
<meta name="theme-color" content="#0a0807">
<title>Biology · Mock Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0807;--surface:#15110d;--surface-2:#1f1812;--border:#2a2018;--border-bright:#3d2f20;--gold:#d4af37;--gold-bright:#f5d76e;--gold-dim:#8a7430;--gold-glow:rgba(212,175,55,0.25);--crimson:#8b0a0a;--crimson-bright:#c41e3a;--crimson-glow:rgba(196,30,58,0.3);--text:#e8dcc4;--text-muted:#9a8a70;--text-dim:#6b5e4a}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:16px;line-height:1.5;min-height:100vh;min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,0.08),transparent 60%)}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:max(env(safe-area-inset-top),1.5rem) 1rem max(env(safe-area-inset-bottom),1.5rem)}
.hub-link{display:inline-block;font-family:'Cinzel',Georgia,serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;margin-bottom:1rem;padding:4px 0}
.hub-link:hover{color:var(--gold)}
.title{font-family:'Cinzel',Georgia,serif;font-weight:700;font-size:clamp(22px,6vw,28px);letter-spacing:0.15em;text-align:center;color:var(--gold);margin:0 0 6px;text-shadow:0 0 30px var(--gold-glow)}
.subtitle{text-align:center;color:var(--text-muted);font-size:13px;margin:0 0 1.5rem;font-style:italic}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:1.25rem 0;opacity:0.6}
.section-label{font-family:'Cinzel',Georgia,serif;font-size:11px;letter-spacing:0.25em;color:var(--gold-dim);text-transform:uppercase;margin:0 0 12px;text-align:center}
.lifetime{display:flex;justify-content:center;gap:1.5rem;font-size:12px;color:var(--text-muted);margin:0 0 1.5rem}
.lifetime span b{color:var(--gold);font-weight:500}
.round-btn{display:block;width:100%;text-align:left;padding:14px 16px;margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;transition:all 0.2s ease;font-family:inherit;font-size:15px;font-weight:500}
.round-btn:hover,.round-btn:active{background:var(--surface-2);border-color:var(--border-bright);transform:translateY(-1px)}
.round-name{font-family:'Cinzel',Georgia,serif;font-size:14px;letter-spacing:0.05em;color:var(--text);display:block}
.round-topic{font-size:12px;font-weight:400;color:var(--text-muted);margin-top:3px;display:block}
.round-stats{font-size:11px;color:var(--gold-dim);margin-top:6px;display:block;letter-spacing:0.05em}
.round-stats b{color:var(--gold);font-weight:500}
.boss-btn{background:linear-gradient(180deg,#1a1310 0%,#0e0a07 100%);border:1px solid var(--gold);box-shadow:0 0 20px var(--gold-glow),inset 0 0 12px rgba(212,175,55,0.05)}
.boss-btn:hover,.boss-btn:active{border-color:var(--gold-bright);box-shadow:0 0 30px var(--gold-glow),inset 0 0 16px rgba(212,175,55,0.08)}
.boss-btn .round-name{color:var(--gold);letter-spacing:0.12em}
.boss-badge{display:inline-block;font-family:'Cinzel',Georgia,serif;font-size:9px;letter-spacing:0.2em;background:var(--gold);color:var(--bg);padding:2px 8px;border-radius:2px;margin-bottom:8px;font-weight:700}
.back-btn{background:none;border:none;color:var(--text-muted);font-size:13px;padding:4px 0;margin-bottom:14px;cursor:pointer;font-family:inherit;letter-spacing:0.05em}
.back-btn:hover{color:var(--gold)}
.q-header{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-muted);margin-bottom:12px;letter-spacing:0.05em}
.q-header b{color:var(--gold);font-weight:500}
.progress{height:3px;background:var(--surface);border-radius:2px;overflow:hidden;margin-bottom:1.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width 0.3s ease;box-shadow:0 0 8px var(--gold-glow)}
.question{font-family:'Cinzel',Georgia,serif;font-size:17px;font-weight:500;line-height:1.4;margin:0 0 1.25rem;color:var(--text)}
.opt{display:block;width:100%;text-align:left;padding:14px 16px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-family:inherit;font-size:15px;line-height:1.4;transition:all 0.2s ease}
.opt:hover:not(:disabled),.opt:active:not(:disabled){background:var(--surface-2);border-color:var(--gold-dim)}
.opt:disabled{cursor:default}
.opt.correct{background:rgba(212,175,55,0.15);border-color:var(--gold);color:var(--gold-bright);box-shadow:0 0 16px var(--gold-glow);animation:pulse-gold 0.4s ease}
.opt.wrong{background:rgba(139,10,10,0.25);border-color:var(--crimson-bright);color:#ffb0b0;box-shadow:0 0 16px var(--crimson-glow);animation:shake 0.4s ease}
.opt.dim{opacity:0.4}
@keyframes pulse-gold{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.explain{margin-top:14px;padding:14px 16px;background:var(--surface);border-left:2px solid var(--gold);border-radius:4px;font-size:14px;line-height:1.55;color:var(--text);animation:fade-up 0.3s ease}
.explain b{font-family:'Cinzel',Georgia,serif;font-weight:500;color:var(--gold);letter-spacing:0.05em;display:inline-block;margin-right:4px}
.explain.crimson{border-left-color:var(--crimson-bright)}
.explain.crimson b{color:var(--crimson-bright)}
.next-btn{display:block;width:100%;margin-top:14px;padding:14px;background:linear-gradient(180deg,var(--gold) 0%,var(--gold-dim) 100%);color:var(--bg);border:none;border-radius:6px;font-family:'Cinzel',Georgia,serif;font-size:14px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;animation:fade-up 0.3s ease 0.1s both}
.next-btn:active{transform:scale(0.98)}
.results{text-align:center;padding:1.5rem 0 0.5rem}
.verdict{font-family:'Cinzel',Georgia,serif;font-size:18px;font-weight:700;letter-spacing:0.2em;color:var(--gold);margin:0 0 1rem;text-shadow:0 0 20px var(--gold-glow);animation:fade-up 0.4s ease}
.verdict.crimson{color:var(--crimson-bright);text-shadow:0 0 20px var(--crimson-glow)}
.score-big{font-family:'Cinzel',Georgia,serif;font-size:64px;font-weight:700;color:var(--gold);margin:8px 0;line-height:1;text-shadow:0 0 30px var(--gold-glow);animation:fade-up 0.4s ease 0.1s both}
.score-pct{font-size:13px;color:var(--text-muted);letter-spacing:0.1em;margin-bottom:1.5rem}
.score-best{font-size:12px;color:var(--gold-dim);letter-spacing:0.05em;margin-bottom:1.5rem;font-style:italic}
.msg{font-size:15px;line-height:1.55;color:var(--text);margin:1rem 0 1.5rem;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;text-align:left;animation:fade-up 0.4s ease 0.2s both}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action-btn{padding:14px;border-radius:6px;font-family:'Cinzel',Georgia,serif;font-size:12px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.action-btn.primary{background:linear-gradient(180deg,var(--gold) 0%,var(--gold-dim) 100%);color:var(--bg);border-color:var(--gold);font-weight:700}
.action-btn:active{transform:scale(0.98)}
.footer{text-align:center;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);font-family:'Cinzel',Georgia,serif}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div></div>
<script>
const Q={cells:[{q:"Which organelle releases energy through respiration?",o:["The nucleus of the cell","The ribosome of the cell","The mitochondrion of the cell","The cell membrane itself"],a:2,e:"Mitochondria release energy from glucose via respiration. Like your Beyblade launcher \u2014 stores energy, then releases it."},{q:"Where in a cell does protein synthesis happen?",o:["Inside the nucleus only","On the cell membrane","Inside the mitochondria","At the ribosomes only"],a:3,e:"Ribosomes are the tiny dots that build proteins by joining amino acids together."},{q:"An Amoeba on a diagram is 13 mm long at \u00d765 magnification. Real length?",o:["It measures 845 \u03bcm","It measures 200 \u03bcm","It measures 20 \u03bcm total","It measures 0.2 \u03bcm"],a:1,e:"Actual = image \u00f7 magnification = 13 \u00f7 65 = 0.2 mm = 200 \u03bcm."},{q:"Which structure is in plant cells but NOT animal cells?",o:["The mitochondria inside","The ribosomes floating free","The rigid cellulose cell wall","The nucleus in the centre"],a:2,e:"Plants have a rigid cellulose cell wall outside the membrane. Animal cells only have a flexible membrane."},{q:"Which is NOT found inside a virus?",o:["A strand of genetic material","A surrounding protein coat","Any form of cytoplasm","An outer surface structure"],a:2,e:"Viruses aren't cells \u2014 no cytoplasm, no organelles. Just genetic material wrapped in a protein coat."},{q:"Which structure contains the chromosomes?",o:["The cytoplasm of the cell","The mitochondria of the cell","The nucleus of the cell","The membrane of the cell"],a:2,e:"Chromosomes (made of DNA) live inside the nucleus \u2014 the cell's instruction library."},{q:"A skin cell has 510 mitochondria. A villus cell has 2000. Why the difference?",o:["Because villus cells are larger","Because villus cells use more energy","Because skin cells are dying off","Because of random cell variation"],a:1,e:"More mitochondria = more energy released. Villus cells actively transport nutrients \u2014 that needs loads of energy."},{q:"What's special about a virus compared to a bacterium?",o:["Viruses are much larger","Viruses contain a nucleus","Viruses can't reproduce alone","Viruses have their own ribosomes"],a:2,e:"Viruses must hijack a host cell to reproduce. Bacteria are full living cells that split on their own."},{q:"What's the main function of the cell membrane?",o:["To hold all the DNA safely","To generate energy for the cell","To control what enters and exits","To build proteins for the cell"],a:2,e:"The cell membrane is selectively permeable \u2014 like a bouncer deciding what gets in and out."},{q:"A diagram is \u00d7100 magnification. Leaf is 50 mm thick on diagram. Real thickness?",o:["The real thickness is 5 mm","The real thickness is 0.5 mm","The real thickness is 0.05 mm","The real thickness is 50 mm"],a:1,e:"Actual = image \u00f7 magnification = 50 \u00f7 100 = 0.5 mm."},{q:"Why do sperm cells have lots of mitochondria?",o:["To safely carry the DNA","To power their swimming tail","To help attack the egg cell","Just for structural support"],a:1,e:"Sperm swim a long distance using their tail. That movement needs energy from respiration."},{q:"Which type of cell does NOT have a nucleus?",o:["A typical animal cell","A typical plant cell","A bacterial cell (prokaryote)","A human skin cell"],a:2,e:"Bacteria are prokaryotes \u2014 DNA floats freely, no true nucleus."},{q:"Which type of cell has chloroplasts?",o:["Most animal cells do","Most bacteria cells do","Most plant cells do","Most virus particles do"],a:2,e:"Only plant cells (and some algae) have chloroplasts for photosynthesis."},{q:"Which structure builds proteins using nuclear instructions?",o:["The mitochondrion does this","The cellulose cell wall does","The ribosome does this","The vacuole does this"],a:2,e:"Nucleus holds the instructions. Ribosomes read them and assemble amino acids into proteins."},{q:"How do bacteria typically reproduce?",o:["Through mitosis division","By splitting in two (fission)","By laying tiny eggs","Through photosynthesis only"],a:1,e:"Bacteria split in half \u2014 binary fission. Super fast, which is why infections multiply quickly."},{q:"A virus inside a host cell uses the cell's ribosomes to...",o:["Destroy the ribosomes","Build new virus proteins","Hide from the immune system","Start photosynthesising light"],a:1,e:"Viruses hijack the host's ribosomes to manufacture new virus parts."}],heart:[{q:"Which vessel carries oxygenated blood from lungs to heart?",o:["The aorta (main artery)","The vena cava (big vein)","The pulmonary artery out","The pulmonary vein back"],a:3,e:"The pulmonary vein is the exception \u2014 a vein carrying oxygenated blood from lungs to the heart's left side."},{q:"Why is the left ventricle wall thicker than the right?",o:["It pumps blood to the body","It pumps blood to the lungs","It collects blood from veins","It holds more blood volume"],a:0,e:"Left ventricle pumps blood all around the body \u2014 needs more muscle. Right only pumps to the nearby lungs."},{q:"Which blood vessel has the highest pressure?",o:["The vena cava (large vein)","The aorta (largest artery)","The pulmonary vein back","The pulmonary artery out"],a:1,e:"The aorta gets blood at full force from the left ventricle \u2014 highest pressure in the body."},{q:"What's the function of semi-lunar valves?",o:["They pump blood outward","They stop backflow into ventricles","They filter the blood cells","They open the atria wider"],a:1,e:"Semi-lunar valves at the base of the aorta and pulmonary artery snap shut to prevent backflow."},{q:"A heart attack damages muscle because...",o:["There is too much oxygen","Blood supply gets blocked off","There is too much exercise","The weather is very cold"],a:1,e:"Coronary arteries blocked \u2192 no oxygen to muscle cells \u2192 they can't respire \u2192 cells die."},{q:"The aorta is what type of vessel?",o:["It is a large vein","It is a tiny capillary","It is the largest artery","It is a bronchiole tube"],a:2,e:"Aorta = biggest artery. Carries oxygenated blood from the left ventricle to the whole body."},{q:"Which vessel brings deoxygenated blood to the heart?",o:["The aorta carries it in","The pulmonary vein does","The vena cava carries it","The coronary artery does"],a:2,e:"Vena cava brings deoxygenated blood from the body back into the right atrium."},{q:"The right ventricle pumps blood to which organ?",o:["It pumps out to the body","It pumps up to the lungs","It pumps up to the brain","It pumps to the stomach"],a:1,e:"Right ventricle \u2192 pulmonary artery \u2192 lungs to pick up oxygen."},{q:"What is the main role of capillaries?",o:["To pump blood with force","To exchange substances with cells","To carry blood from the heart","To store fat within tissue"],a:1,e:"Capillaries have walls one cell thick \u2014 perfect for exchanging O\u2082, CO\u2082, glucose with cells."},{q:"Why do veins contain internal valves?",o:["Because of high blood pressure","Because low pressure causes backflow","Because they look decorative","Because they need to filter blood"],a:1,e:"Vein blood is low pressure. Valves stop it pooling backwards, especially fighting gravity."},{q:"Arteries vs veins \u2014 key structural difference?",o:["Arteries away, thick; veins back, thin with valves","They are identical in every way","Veins only carry oxygenated blood","Arteries are much smaller tubes"],a:0,e:"A for Away. Thick artery walls handle high pressure. Veins have valves for low pressure."},{q:"Which vessels supply blood to the heart muscle itself?",o:["The pulmonary artery pair","The coronary artery pair","The vena cava veins only","The aorta directly does"],a:1,e:"Coronary arteries branch off the aorta and feed oxygen to heart muscle. Block one = heart attack."},{q:"What's the difference between atria and ventricles?",o:["Atria pump out, ventricles receive","Atria receive, ventricles pump out","They perform the same function","Atria sit below the ventricles"],a:1,e:"Atria = top receiving chambers. Ventricles = bottom pumping chambers, much more muscular."},{q:"Which valve type prevents backflow from arteries into ventricles?",o:["The atrioventricular valve type","The semi-lunar valve type","The bicuspid valve only","The mitral valve only"],a:1,e:"Semi-lunar valves close when ventricles relax, preventing backflow from arteries."}],enzymes:[{q:"Which enzyme breaks down protein into amino acids?",o:["Maltase breaks it down","Amylase breaks it down","Protease breaks it down","Lipase breaks it down"],a:2,e:"Protease (like pepsin) breaks proteins into amino acids."},{q:"What happens to an enzyme if it gets too hot?",o:["It speeds up permanently","It denatures (shape changes)","It multiplies into more","It freezes and stops cold"],a:1,e:"Heat warps the active site. Denatured = shape wrecked, substrates won't fit."},{q:"Stomach enzymes work best at what pH?",o:["Around pH 2 (very acidic)","Around pH 7 (fully neutral)","Around pH 9 (mildly alkaline)","Around pH 14 (very alkaline)"],a:0,e:"The stomach is super acidic (pH 1\u20132). Pepsin is built for that."},{q:"What's the optimum pH for a mouth enzyme?",o:["Approximately pH 1.0","Approximately pH 2.5","Approximately pH 6.2","Approximately pH 10.0"],a:2,e:"Saliva is roughly neutral (pH 6\u20137). Salivary amylase works best there."},{q:"Maltase breaks maltose into which product?",o:["Into individual amino acids","Into fatty acid molecules","Into glucose molecules only","Back into starch chains"],a:2,e:"Maltase splits maltose into two glucose molecules."},{q:"What happens to enzyme activity at a pH far below optimum?",o:["The reaction speeds up","The rate stays the same","The rate drops as shape changes","The enzyme starts to multiply"],a:2,e:"Wrong pH changes the active site shape \u2014 substrates can't bind."},{q:"Which enzyme is used in genetic modification?",o:["Amylase (starch enzyme)","Maltase (sugar enzyme)","Restriction enzyme (DNA cutter)","Lipase (fat-splitting enzyme)"],a:2,e:"Restriction enzymes cut DNA at specific sequences \u2014 like genetic scissors."},{q:"Enzyme P peaks at pH 2.5. Where is it most likely working?",o:["Inside the mouth cavity","Inside the small intestine","Inside the stomach lining","Inside the cell nucleus"],a:2,e:"pH 2.5 is super acidic \u2014 that's stomach territory."},{q:"Where does starch digestion mostly begin?",o:["In the acidic stomach","In the mouth via amylase","In the liver directly","In the large intestine"],a:1,e:"Salivary amylase starts breaking down starch the moment you chew."},{q:"What does lipase break down?",o:["Protein into amino acids","Starch into sugar molecules","Fats into fatty acids and glycerol","DNA into separate nucleotides"],a:2,e:"Lipase digests fats. Made by the pancreas, works in the small intestine."},{q:"What does the 'lock and key' model describe?",o:["How cells reproduce by dividing","How active sites fit one substrate","How DNA replicates its strands","How muscle fibres contract"],a:1,e:"Active site has a specific shape \u2014 only the matching substrate fits."},{q:"Optimum temperature for most human enzymes?",o:["Around 0\u00b0C (freezing point)","Around 25\u00b0C (room temperature)","Around 37\u00b0C (body temperature)","Around 100\u00b0C (boiling point)"],a:2,e:"37\u00b0C is body temperature \u2014 enzymes evolved to work fastest here."},{q:"What does bile do in digestion?",o:["It digests protein directly","It emulsifies fat into droplets","It kills bacteria in food","It converts starch to glucose"],a:1,e:"Bile breaks fat into tiny droplets \u2014 bigger surface area for lipase."},{q:"Below optimum temperature, what happens to enzyme activity?",o:["The reaction gets faster","The reaction gets much slower","The enzyme becomes denatured","There is absolutely no change"],a:1,e:"Cold = slower particles = fewer collisions = slower reaction. NOT denatured though."},{q:"The pancreas releases its enzymes into the...?",o:["The stomach for digestion","The mouth for chewing food","The small intestine for absorption","The liver for bile production"],a:2,e:"Pancreatic enzymes flow into the small intestine where most digestion happens."}],lungs:[{q:"When you breathe IN, what does the diaphragm do?",o:["It relaxes and moves upward","It contracts and moves downward","It disappears from the thorax","It stays completely still"],a:1,e:"Diaphragm contracts and flattens down \u2192 chest expands \u2192 air rushes in."},{q:"Correct path of air into the lungs?",o:["Trachea, bronchus, bronchiole, alveolus","Bronchus, trachea, alveolus, bronchiole","Alveolus, trachea, bronchus, bronchiole","Trachea, bronchiole, alveolus, bronchus"],a:0,e:"Big tube \u2192 branches \u2192 smaller branches \u2192 tiny air sacs."},{q:"Which gas stays the same % between inhaled and exhaled air?",o:["Oxygen drops from 20 to 16","Carbon dioxide rises sharply","Nitrogen stays at 79 percent","Water vapour increases a lot"],a:2,e:"Body doesn't use nitrogen. O\u2082 drops, CO\u2082 rises."},{q:"Why is the palisade layer at the TOP of the leaf?",o:["To make the leaf look green","To absorb the most sunlight","To store water for later use","To allow easier gas exchange"],a:1,e:"Palisade cells packed with chloroplasts. Top = closest to light = max absorption."},{q:"Where are stomata usually found on a normal leaf?",o:["Only on the upper leaf surface","Mainly on the lower leaf surface","On the stem of the plant","Deep inside the xylem tubes"],a:1,e:"Stomata mostly underneath to reduce water loss."},{q:"What does the xylem transport?",o:["Sugars made by the leaves","Amino acids around the plant","Water and minerals from roots","Oxygen gas to every cell"],a:2,e:"Xylem = water + minerals upward. Phloem = sugars both ways."},{q:"What does the phloem transport?",o:["Only water from the roots","Sugars and amino acids around","Carbon dioxide gas to leaves","Blood cells to plant organs"],a:1,e:"Phloem moves sugars and amino acids around the plant."},{q:"Which feature of alveoli helps gas exchange?",o:["They have very thick walls","They have a huge surface area","They have a very dry surface","They have slow blood flow past"],a:1,e:"Alveoli: huge surface area, thin walls, moist, rich blood supply."},{q:"How are fish gills similar to alveoli?",o:["They both contain tiny lungs","Both have large surface area and thin walls","They are both kept dry","They both store water inside"],a:1,e:"Same engineering. Gills have filaments for surface area, thin walls, good blood supply."},{q:"Which part of the leaf is the waxy waterproof layer?",o:["The stomata pore openings","The xylem transport tubes","The cuticle waxy coating","The spongy mesophyll layer"],a:2,e:"Cuticle = waxy waterproof coating on top. Stops water evaporating."},{q:"Why does the spongy mesophyll have air gaps?",o:["To make the leaf much lighter","To let gases move easily through","For purely decorative reasons","To store glucose for later"],a:1,e:"Air spaces let CO\u2082 and O\u2082 diffuse easily."},{q:"What does CO\u2082 change from in inhaled to exhaled air?",o:["It drops from 4% to 0.04%","It rises from 0.04% to 4%","It drops from 20% to 16%","It stays the same at 79%"],a:1,e:"CO\u2082 is a waste product of respiration. Exhaled air has way more."},{q:"Where do plants get their glucose from?",o:["They absorb it from the soil","They make it via photosynthesis","They get it from eating insects","They pull it from the air directly"],a:1,e:"Plants make glucose using CO\u2082 + water + light energy."},{q:"The villus is found in the...?",o:["The lungs for breathing","The heart for pumping","The small intestine for absorbing","The brain for processing signals"],a:2,e:"Villi = finger-like projections in small intestine for max absorption."},{q:"A small branching tube inside the lung is called a...?",o:["An alveolus (air sac)","A bronchiole (small tube)","The trachea (windpipe)","The diaphragm (muscle sheet)"],a:1,e:"Bronchioles are small branches leading to clusters of alveoli."},{q:"Why do water lily leaves have stomata only on the upper surface?",o:["Bottom sits in water, stomata can't work","The lily grows completely upside down","Sunlight only hits the bottom side","It happens randomly with no reason"],a:0,e:"Stomata need AIR. Underwater stomata would be useless."},{q:"Alveolar air has 14% O\u2082 but exhaled air has 16% O\u2082. Why?",o:["Exhaled air mixes with fresh airway air","The lungs actively add oxygen back","There's a measurement error here","Nearby plants release extra oxygen"],a:0,e:"On the way out, alveolar air mixes with fresher air in the trachea."},{q:"Inhaled air is 20% O\u2082. Exhaled is 16%. Where did the 4% go?",o:["The lungs absorbed and ate it","Body cells used it for respiration","It got converted into nitrogen gas","Nothing happened, it's still there"],a:1,e:"Cells take O\u2082 from blood for aerobic respiration."},{q:"Which gas is consumed during aerobic respiration?",o:["Carbon dioxide is consumed","Nitrogen gas is consumed","Oxygen gas is consumed","Methane gas is consumed"],a:2,e:"Glucose + oxygen \u2192 CO\u2082 + water + energy."},{q:"Which feature of the leaf reduces water loss?",o:["The spongy mesophyll tissue","The palisade cell layer below","The waxy cuticle coating on top","The xylem transport vessels"],a:2,e:"Waxy cuticle = waterproof layer on top. Like a raincoat."},{q:"Take a fish out of water \u2014 why does it die?",o:["The air is far too cold for it","Gill filaments collapse and stick together","There is no food on land","Fish are simply afraid of air"],a:1,e:"In water, filaments fan out. In air they clump \u2014 can't absorb enough O\u2082."},{q:"What does the diaphragm do when you breathe OUT?",o:["It contracts and pushes down","It relaxes and moves back up","It disappears from the thorax","It stays completely flat and still"],a:1,e:"Breathing out: diaphragm relaxes, domes up, chest shrinks, air out."},{q:"Which substance moves OUT of blood during lung gas exchange?",o:["Oxygen moves out of blood","Carbon dioxide moves out of blood","Glucose moves out of blood","Water moves out of blood"],a:1,e:"CO\u2082 diffuses from blood into alveoli to be exhaled."},{q:"What feature is shared by alveoli, villi, AND gills?",o:["They all carry red blood cells","They all have large surface areas","They all produce their own ATP","They all contain cell nuclei"],a:1,e:"Three organs, same trick \u2014 maximise surface area for exchange."},{q:"Aquarium O\u2082 drops rapidly between aerator uses. What does this suggest?",o:["The aerator is working perfectly","Fish use O\u2082 faster than it's replaced","The aquarium plants are thriving","The water temperature is too cold"],a:1,e:"Sharp drops mean fish + bacteria consume O\u2082 faster than it's replenished."},{q:"Why might LARGE bubbles from an aerator be worse than small ones?",o:["Big bubbles look much nicer","Small bubbles have more total surface area","Large bubbles will freeze water","Fish strongly prefer big bubbles"],a:1,e:"Smaller bubbles = more surface area = more O\u2082 dissolves."}],osmosis:[{q:"Osmosis is the movement of...",o:["Any molecule, low to high conc.","Water through a permeable membrane","Glucose using ATP energy only","Oxygen directly into body cells"],a:1,e:"Osmosis = WATER through a partially permeable membrane. No energy needed."},{q:"Why are stem cells useful for repairing damaged hearts?",o:["They produce red blood cells","They can become any cell type","They directly kill virus particles","They store oxygen for later use"],a:1,e:"Stem cells are undifferentiated \u2014 can become heart muscle cells. Like a Mimic Tear."},{q:"A potato cube in pure water gains mass. Why?",o:["It absorbs the dissolved sugar","Water moves IN via osmosis","The potato grows brand new cells","Water simply evaporates away"],a:1,e:"Pure water has higher water potential. Water moves IN by osmosis."},{q:"A potato cube in 1 M sucrose loses mass. Why?",o:["The sugar dissolves the potato","Water moves OUT via osmosis","Active transport removes water","Heat causes mass to evaporate"],a:1,e:"Strong sucrose = less water outside. Water moves OUT by osmosis."},{q:"Which process requires ATP (energy)?",o:["Diffusion (high to low conc.)","Osmosis (water movement only)","Active transport (low to high)","Sedimentation (settling down)"],a:2,e:"Active transport pushes uphill \u2014 low to high concentration. Needs ATP."},{q:"Why are stem cells from the SAME person better?",o:["Because they are much cheaper","Because they won't be rejected","Because they are physically larger","Because they glow under UV light"],a:1,e:"Your immune system recognises your own cells. Others can trigger rejection."},{q:"What is diffusion best described as?",o:["Movement of water molecules only","Movement from high to low conc.","A process that requires ATP","Something only plants can do"],a:1,e:"Diffusion = ANY substance spreading from high to low concentration."},{q:"Put a red blood cell in pure water. What happens?",o:["Absolutely nothing changes","The cell shrinks and shrivels","Water rushes in and it bursts","The cell turns completely blue"],a:2,e:"Water floods in by osmosis. No cell wall to resist \u2014 it bursts."},{q:"A graph shows 45 mm/hour. What's that in mm/min?",o:["It equals 4.5 mm per minute","It equals 0.75 mm per minute","It equals 2700 mm per minute","It equals 7.5 mm per minute"],a:1,e:"Divide by 60: 45 \u00f7 60 = 0.75 mm/min."},{q:"Why do villi need so many mitochondria?",o:["To help digest food directly","To power active transport of nutrients","To store sugar for the body","To maintain structural balance"],a:1,e:"Active transport needs ATP. ATP comes from mitochondria."},{q:"Formula for percentage change in mass?",o:["Just subtract: Final minus Original","(Final \u2212 Original) \u00f7 Original \u00d7 100","Simply divide: Original by Final","Just multiply: Final times 100"],a:1,e:"Change \u00f7 original \u00d7 100. Negative = lost mass. Positive = gained."},{q:"Original mass 2.2 g, final mass 2.3 g. Percentage change?",o:["The change is exactly +4.5%","The change is exactly \u22124.5%","The change is exactly +0.1%","The change is exactly +10.0%"],a:0,e:"(2.3 \u2212 2.2) \u00f7 2.2 \u00d7 100 = 4.5%."},{q:"Why dry potato cylinders before weighing in an osmosis experiment?",o:["To make them look nicer overall","To remove surface water for accuracy","To kill any bacteria on them","To cool them down before weighing"],a:1,e:"Surface water would make the mass reading inaccurately high."},{q:"Diluting 1 M sucrose: 16 cm\u00b3 sucrose used. How much water?",o:["You add 0 cm\u00b3 of water","You add 4 cm\u00b3 of water","You add 8 cm\u00b3 of water","You add 16 cm\u00b3 of water"],a:1,e:"Total must equal 20 cm\u00b3: 20 \u2212 16 = 4 cm\u00b3 water."},{q:"Active transport moves substances in which direction?",o:["From high to low, without energy","From low to high, using ATP energy","Straight through the cell nucleus","By osmosis across a membrane"],a:1,e:"Active transport pushes things uphill. Needs ATP. Used by plant roots."},{q:"Which is NOT a property of stem cells?",o:["They are able to divide","They can become specialised cells","They are already fully specialised","They are found in early embryos"],a:2,e:"Stem cells are UNDIFFERENTIATED. Once specialised, they're not stem cells."}]};
const ROUNDS=[{id:'cells',name:'Cells & microscopy',topic:'Organelles, viruses, magnification',count:10,pool:'cells'},{id:'heart',name:'Heart & circulation',topic:'Vessels, valves, ventricles',count:10,pool:'heart'},{id:'enzymes',name:'Enzymes & digestion',topic:'pH, denaturing, digestion',count:10,pool:'enzymes'},{id:'lungs',name:'Lungs, leaves & gas exchange',topic:'Breathing, photosynthesis, adaptations',count:10,pool:'lungs'},{id:'osmosis',name:'Osmosis & stem cells',topic:'Diffusion, transport, repair',count:10,pool:'osmosis'},{id:'random',name:'The Final Boss',topic:'15 questions pulled from all 87',count:15,pool:'all'}];
const STORAGE_KEY='biology-boss-battle-v1';const app=document.getElementById('app');let state={round:null,qIdx:0,score:0,answered:false,questions:[],currentShuffle:null};
function loadStats(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return{}}}
function saveStats(roundId,score,total){try{const stats=loadStats();if(!stats[roundId])stats[roundId]={best:0,plays:0,totalCorrect:0,totalQuestions:0};stats[roundId].plays++;stats[roundId].best=Math.max(stats[roundId].best,score);stats[roundId].totalCorrect+=score;stats[roundId].totalQuestions+=total;localStorage.setItem(STORAGE_KEY,JSON.stringify(stats))}catch{}}
function lifetimeStats(){const stats=loadStats();let plays=0,correct=0,total=0;for(const id in stats){plays+=stats[id].plays;correct+=stats[id].totalCorrect;total+=stats[id].totalQuestions}return{plays,accuracy:total?Math.round((correct/total)*100):0}}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function getPool(poolId){if(poolId==='all')return[...Q.cells,...Q.heart,...Q.enzymes,...Q.lungs,...Q.osmosis];return Q[poolId]}
function poolSize(poolId){return poolId==='all'?87:Q[poolId].length}
function shuffleOptions(q){const indices=[0,1,2,3];const shuffled=shuffle(indices);return{opts:shuffled.map(i=>q.o[i]),correctIdx:shuffled.indexOf(q.a)}}
function renderHome(){window.scrollTo(0,0);const stats=loadStats();const life=lifetimeStats();const themed=ROUNDS.slice(0,5).map(r=>{const s=stats[r.id];const statLine=s?`<span class="round-stats">Best <b>${s.best}/${r.count}</b> &middot; Played ${s.plays}\u00d7</span>`:`<span class="round-stats">Not yet attempted</span>`;return`<button class="round-btn" data-id="${r.id}"><span class="round-name">${r.name}</span><span class="round-topic">${r.topic} \u00b7 10 from ${poolSize(r.pool)}</span>${statLine}</button>`}).join('');const boss=ROUNDS[5];const bossStats=stats[boss.id];const bossLine=bossStats?`<span class="round-stats">Best <b>${bossStats.best}/${boss.count}</b> &middot; Defeated ${bossStats.plays}\u00d7</span>`:`<span class="round-stats">Awaits the worthy</span>`;const lifeLine=life.plays>0?`<div class="lifetime"><span><b>${life.plays}</b> runs</span><span><b>${life.accuracy}%</b> accuracy</span></div>`:'';
app.innerHTML=`<a href="index.html" class="hub-link">\u2190 Mock Mode</a><h1 class="title">Biology</h1><p class="subtitle">Drill a topic. Test it all. Replay forever.</p>${lifeLine}<div class="divider"></div><p class="section-label">Drill a topic</p>${themed}<div class="divider"></div><p class="section-label">Or test everything</p><button class="round-btn boss-btn" data-id="${boss.id}"><span class="boss-badge">Final Boss</span><span class="round-name">${boss.name}</span><span class="round-topic">${boss.topic}</span>${bossLine}</button><div class="footer">Tarnished, arise.</div>`;app.querySelectorAll('.round-btn').forEach(btn=>{btn.addEventListener('click',()=>startRound(btn.dataset.id))})}
function startRound(roundId){const round=ROUNDS.find(r=>r.id===roundId);state={round,qIdx:0,score:0,answered:false,questions:shuffle(getPool(round.pool)).slice(0,round.count),currentShuffle:null};renderQuestion()}
function renderQuestion(){window.scrollTo(0,0);const q=state.questions[state.qIdx];const total=state.questions.length;const pct=(state.qIdx/total)*100;state.currentShuffle=shuffleOptions(q);const opts=state.currentShuffle.opts.map((opt,i)=>`<button class="opt" data-i="${i}">${opt}</button>`).join('');app.innerHTML=`<button class="back-btn" id="home-btn">\u2190 Back to rounds</button><div class="q-header"><span>${state.round.name} \u00b7 Q<b>${state.qIdx+1}</b> of ${total}</span><span>Score <b>${state.score}</b></span></div><div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div><p class="question">${q.q}</p><div id="opts">${opts}</div><div id="feedback"></div>`;document.getElementById('home-btn').addEventListener('click',renderHome);app.querySelectorAll('.opt').forEach(btn=>{btn.addEventListener('click',()=>selectAnswer(parseInt(btn.dataset.i)))})}
function selectAnswer(picked){if(state.answered)return;state.answered=true;const q=state.questions[state.qIdx];const correctIdx=state.currentShuffle.correctIdx;const correct=picked===correctIdx;if(correct)state.score++;app.querySelectorAll('.opt').forEach((btn,i)=>{btn.disabled=true;if(i===correctIdx)btn.classList.add('correct');else if(i===picked)btn.classList.add('wrong');else btn.classList.add('dim')});const verdict=correct?'Correct.':'Not quite.';const explainClass=correct?'explain':'explain crimson';const isLast=state.qIdx>=state.questions.length-1;document.getElementById('feedback').innerHTML=`<div class="${explainClass}"><b>${verdict}</b> ${q.e}</div><button class="next-btn" id="next-btn">${isLast?'See your verdict':'Next question'} \u2192</button>`;document.getElementById('next-btn').addEventListener('click',advance)}
function advance(){state.answered=false;state.qIdx++;if(state.qIdx>=state.questions.length)renderResults();else renderQuestion()}
function renderResults(){window.scrollTo(0,0);const total=state.questions.length;const score=state.score;const pct=Math.round((score/total)*100);saveStats(state.round.id,score,total);const stats=loadStats();const best=stats[state.round.id].best;const isNewBest=score===best&&stats[state.round.id].plays>1&&score>0;const isFirstRun=stats[state.round.id].plays===1;let verdict,msg,verdictClass='';if(pct===100){verdict='Flawless Victory';msg="Pure radiance. No notes. You\u2019ve fully cooked this round."}else if(pct>=80){verdict='Worthy of Grace';msg="Massive run. Topic basically locked in."}else if(pct>=60){verdict='A Solid Run';msg="Good work. Reread the explanations on the missed ones, then come back."}else if(pct>=40){verdict='Keep Grinding';msg="Getting there. Quick cheat sheet look, replay, easy gains.";verdictClass='crimson'}else{verdict='Try Again, Tarnished';msg="Now you know which bits to drill \u2014 that\u2019s the win. No retry penalty.";verdictClass='crimson'}let bestLine='';if(isNewBest)bestLine='<div class="score-best">\u2728 New personal best</div>';else if(!isFirstRun)bestLine=`<div class="score-best">Personal best: ${best}/${total}</div>`;app.innerHTML=`<button class="back-btn" id="home-btn">\u2190 Back to rounds</button><div class="results"><div class="verdict ${verdictClass}">${verdict}</div><div class="score-big">${score}/${total}</div><div class="score-pct">${pct}% \u00b7 ${state.round.name}</div>${bestLine}<div class="msg">${msg}</div><div class="actions"><button class="action-btn primary" id="replay-btn">Replay</button><button class="action-btn" id="pick-btn">Pick another</button></div></div>`;document.getElementById('home-btn').addEventListener('click',renderHome);document.getElementById('replay-btn').addEventListener('click',()=>startRound(state.round.id));document.getElementById('pick-btn').addEventListener('click',renderHome)}
renderHome();
</script>
