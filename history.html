<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History · Mock Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   HISTORY · PARCHMENT + BLOOD RED · MOCK MODE
   ========================================================= */

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #1a0f0a;
  --bg-mid: #261713;
  --parchment: #e8d5a8;
  --parchment-dim: #c9b48a;
  --parchment-bright: #f5e4ba;
  --blood: #8b1a1a;
  --blood-bright: #b82828;
  --blood-glow: rgba(184, 40, 40, 0.4);
  --ink: #2a1810;
  --gold-accent: #c9a961;
  --shadow-deep: rgba(0, 0, 0, 0.6);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-deep);
  background-image:
    radial-gradient(ellipse at top, #3a2118 0%, #1a0f0a 60%),
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(184, 40, 40, 0.02) 2px, rgba(184, 40, 40, 0.02) 4px);
  color: var(--parchment);
  min-height: 100vh;
  padding: 16px;
  line-height: 1.5;
}

h1, h2, h3 {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  letter-spacing: 0.04em;
}

.back-link {
  display: inline-block;
  color: var(--parchment-dim);
  text-decoration: none;
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  padding: 8px 14px;
  border: 1px solid rgba(201, 169, 97, 0.3);
  border-radius: 4px;
  background: rgba(0, 0, 0, 0.3);
  margin-bottom: 20px;
  transition: all 0.2s;
}
.back-link:hover {
  color: var(--parchment-bright);
  border-color: var(--gold-accent);
  background: rgba(139, 26, 26, 0.2);
}

.container { max-width: 720px; margin: 0 auto; }

.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.title-block {
  text-align: center;
  padding: 24px 0 28px;
  border-bottom: 2px solid var(--blood);
  margin-bottom: 32px;
  position: relative;
}
.title-block::before, .title-block::after {
  content: "⚜";
  position: absolute;
  bottom: -14px;
  background: var(--bg-deep);
  padding: 0 12px;
  color: var(--gold-accent);
  font-size: 1.2rem;
}
.title-block::before { left: calc(50% - 60px); }
.title-block::after { right: calc(50% - 60px); }

.subject-badge {
  display: inline-block;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  color: var(--blood-bright);
  border: 1px solid var(--blood);
  padding: 4px 12px;
  margin-bottom: 12px;
}
.title-block h1 {
  font-size: 2.4rem;
  color: var(--parchment-bright);
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6), 0 0 20px rgba(184, 40, 40, 0.2);
  margin-bottom: 8px;
}
.tagline {
  color: var(--parchment-dim);
  font-style: italic;
  font-size: 0.95rem;
}

.rounds-grid { display: grid; gap: 14px; }
.round-card {
  background: linear-gradient(135deg, rgba(38, 23, 19, 0.95), rgba(26, 15, 10, 0.95));
  border: 1px solid rgba(201, 169, 97, 0.25);
  border-radius: 8px;
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.round-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--blood);
  transition: width 0.2s;
}
.round-card:hover {
  border-color: var(--gold-accent);
  transform: translateX(4px);
  box-shadow: 0 4px 16px var(--shadow-deep);
}
.round-card:hover::before { width: 6px; background: var(--blood-bright); }

.round-card.boss {
  background: linear-gradient(135deg, rgba(80, 14, 14, 0.6), rgba(38, 23, 19, 0.95));
  border-color: var(--blood);
}
.round-card.boss::before {
  background: var(--blood-bright);
  box-shadow: 0 0 12px var(--blood-glow);
}

.round-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 6px;
}
.round-title {
  font-family: 'Cinzel', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--parchment-bright);
}
.round-icon { font-size: 1.4rem; }
.round-desc {
  font-size: 0.88rem;
  color: var(--parchment-dim);
  margin-bottom: 8px;
}
.round-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.1em;
  color: var(--gold-accent);
}
.best-score {
  color: var(--blood-bright);
  font-weight: 700;
}

.q-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(201, 169, 97, 0.2);
}
.q-round-name {
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  color: var(--parchment-dim);
  letter-spacing: 0.05em;
}
.q-progress-text {
  font-family: 'Cinzel', serif;
  color: var(--gold-accent);
  font-size: 0.9rem;
}

.progress-bar {
  height: 6px;
  background: rgba(201, 169, 97, 0.15);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 24px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blood), var(--blood-bright));
  width: 0%;
  transition: width 0.3s ease;
  box-shadow: 0 0 8px var(--blood-glow);
}

.question-box {
  background: rgba(38, 23, 19, 0.6);
  border-left: 4px solid var(--blood);
  padding: 20px 22px;
  border-radius: 6px;
  margin-bottom: 22px;
  font-size: 1.08rem;
  line-height: 1.55;
  color: var(--parchment-bright);
}

.options { display: grid; gap: 10px; margin-bottom: 20px; }
.option {
  background: rgba(38, 23, 19, 0.7);
  color: var(--parchment);
  border: 1px solid rgba(201, 169, 97, 0.3);
  padding: 14px 18px;
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 0.98rem;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.option:not(:disabled):hover {
  border-color: var(--gold-accent);
  background: rgba(139, 26, 26, 0.2);
  transform: translateX(2px);
}
.option-letter {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  color: var(--gold-accent);
  min-width: 22px;
}
.option:disabled { cursor: default; opacity: 0.85; }
.option.correct {
  background: rgba(40, 100, 40, 0.35);
  border-color: #5a9a4a;
  color: #d4f0c4;
}
.option.correct .option-letter { color: #9ed68a; }
.option.wrong {
  background: rgba(139, 26, 26, 0.4);
  border-color: var(--blood-bright);
}

.feedback {
  display: none;
  padding: 16px 20px;
  border-radius: 6px;
  margin-bottom: 16px;
  border-left: 4px solid;
}
.feedback.show { display: block; animation: fadeIn 0.3s; }
.feedback.correct {
  background: rgba(40, 100, 40, 0.2);
  border-color: #5a9a4a;
}
.feedback.wrong {
  background: rgba(139, 26, 26, 0.25);
  border-color: var(--blood-bright);
}
.feedback-title {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}
.feedback.correct .feedback-title { color: #b8e8a0; }
.feedback.wrong .feedback-title { color: #ff8585; }
.feedback-text {
  color: var(--parchment);
  font-size: 0.95rem;
  line-height: 1.55;
}

.next-btn {
  display: none;
  width: 100%;
  background: linear-gradient(135deg, var(--blood), var(--blood-bright));
  color: var(--parchment-bright);
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.15em;
  padding: 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 12px var(--blood-glow);
}
.next-btn.show { display: block; animation: fadeIn 0.3s; }
.next-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 18px var(--blood-glow);
}

.results-block { text-align: center; padding: 20px 0; }
.results-round-name {
  font-family: 'Cinzel', serif;
  color: var(--parchment-dim);
  letter-spacing: 0.1em;
  margin-bottom: 18px;
  font-size: 1rem;
}

.score-circle {
  width: 180px;
  height: 180px;
  margin: 0 auto 24px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(184, 40, 40, 0.15) 0%, rgba(26, 15, 10, 0.9) 70%);
  border: 3px solid var(--blood);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 40px var(--blood-glow), inset 0 0 30px rgba(0,0,0,0.5);
}
.score-num {
  font-family: 'Cinzel', serif;
  font-size: 4rem;
  font-weight: 900;
  color: var(--parchment-bright);
  line-height: 1;
  text-shadow: 0 0 12px var(--blood-glow);
}
.score-total {
  font-family: 'Cinzel', serif;
  color: var(--gold-accent);
  font-size: 1.1rem;
  margin-top: 4px;
}

.score-message {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--blood-bright);
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}
.score-sub {
  color: var(--parchment-dim);
  font-size: 0.95rem;
  margin-bottom: 20px;
  font-style: italic;
}

.new-best {
  display: none;
  background: linear-gradient(135deg, rgba(201, 169, 97, 0.25), rgba(184, 40, 40, 0.15));
  border: 1px solid var(--gold-accent);
  padding: 10px 16px;
  border-radius: 6px;
  margin-bottom: 20px;
  font-family: 'Cinzel', serif;
  color: var(--gold-accent);
  letter-spacing: 0.1em;
  font-size: 0.9rem;
}

.results-buttons { display: grid; gap: 10px; max-width: 360px; margin: 0 auto; }
.btn-primary, .btn-secondary {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 13px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.95rem;
  transition: all 0.2s;
  border: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--blood), var(--blood-bright));
  color: var(--parchment-bright);
  box-shadow: 0 2px 12px var(--blood-glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 18px var(--blood-glow); }
.btn-secondary {
  background: transparent;
  color: var(--parchment);
  border: 1px solid rgba(201, 169, 97, 0.4);
}
.btn-secondary:hover { background: rgba(139, 26, 26, 0.2); border-color: var(--gold-accent); }

@media (max-width: 480px) {
  .title-block h1 { font-size: 1.8rem; }
  .question-box { font-size: 1rem; padding: 16px; }
  .option { font-size: 0.92rem; padding: 12px 14px; }
  .score-num { font-size: 3.2rem; }
  .score-circle { width: 150px; height: 150px; }
}
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back-link">← MOCK MODE</a>

  <div id="home-screen" class="screen active">
    <div class="title-block">
      <div class="subject-badge">SUBJECT · 03</div>
      <h1>HISTORY</h1>
      <div class="tagline">Empires fall. Dictators rise. Pick your battle.</div>
    </div>
    <div class="rounds-grid" id="rounds-grid"></div>
  </div>

  <div id="question-screen" class="screen">
    <div class="q-header">
      <div class="q-round-name" id="q-round-name"></div>
      <div class="q-progress-text" id="q-progress-text"></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="question-box" id="question-box"></div>
    <div class="options" id="options-container"></div>
    <div class="feedback" id="feedback">
      <div class="feedback-title" id="feedback-title"></div>
      <div class="feedback-text" id="feedback-text"></div>
    </div>
    <button class="next-btn" id="next-btn">NEXT →</button>
  </div>

  <div id="results-screen" class="screen">
    <div class="results-block">
      <div class="results-round-name" id="results-round-name"></div>
      <div class="score-circle">
        <div class="score-num" id="score-num">0</div>
        <div class="score-total" id="score-total">/ 10</div>
      </div>
      <div class="score-message" id="score-message"></div>
      <div class="score-sub" id="score-sub"></div>
      <div class="new-best" id="new-best">⚜ NEW PERSONAL BEST ⚜</div>
      <div class="results-buttons">
        <button class="btn-primary" id="play-again-btn">RUN IT BACK</button>
        <button class="btn-secondary" id="back-home-btn">CHOOSE ANOTHER ROUND</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ==========================================================
   QUESTION BANK · HISTORY (v2 — balanced option lengths)
   All four options per question are roughly the same length.
   Options are shuffled every render via shuffleOptions().
   ========================================================== */
const QUESTION_BANK = {
  weimar: [
    {
      q: "The Weimar Constitution gave Germany proportional representation. What did this mean in practice?",
      options: [
        "Only the largest party could hold seats, keeping the Reichstag stable",
        "Seats matched each party's share of votes, creating many small parties",
        "Voters picked between two main parties in a run-off ballot system",
        "The Kaiser still chose the Chancellor from the biggest party's list"
      ],
      correct: 1,
      explain: "Proportional representation = seats match votes. Sounds fair, but it meant lots of tiny parties got in, no one ever had a majority, and coalitions kept collapsing. Big weakness."
    },
    {
      q: "What was Article 48 of the Weimar Constitution?",
      options: [
        "It gave all German women the right to vote in national elections",
        "It abolished the German army and replaced it with a small militia",
        "It let the President rule by decree in emergencies, bypassing parliament",
        "It restored the Kaiser's role as ceremonial head of the German state"
      ],
      correct: 2,
      explain: "Article 48 = emergency powers. Designed as a safety valve, but Hitler later weaponised it to crush democracy. The constitution literally contained the tool used to destroy it."
    },
    {
      q: "Which of these was a STRENGTH of the Weimar Constitution?",
      options: [
        "It guaranteed single-party rule, giving Germany much-needed stability",
        "All Germans over 20 could vote, including women — hugely democratic",
        "It removed all civil liberties to prevent revolutionary street unrest",
        "It kept the monarchy in place but with strictly limited legal powers"
      ],
      correct: 1,
      explain: "Universal suffrage from age 20 (women included!) made Weimar one of the most democratic constitutions on the planet at the time. The problem wasn't the rules — it was how Germans felt about them."
    },
    {
      q: "Why did many Germans dislike the Weimar Republic from the start?",
      options: [
        "They blamed it for signing Versailles — calling its leaders 'November Criminals'",
        "It was secretly controlled by the British government through trade agreements",
        "It banned all traditional German cultural events and replaced them with French ones",
        "It rebuilt Germany's military too quickly, making neighbouring countries hostile"
      ],
      correct: 0,
      explain: "The 'stab in the back' myth: Weimar politicians were branded the 'November Criminals' for signing Versailles. Never mind that the army had already lost — the Republic took the blame forever."
    },
    {
      q: "The Weimar Constitution had a President AND a Chancellor. What was the key problem?",
      options: [
        "Both officials were always the same person, creating a conflict of interest",
        "The President could override the Chancellor in a crisis using Article 48",
        "Neither had any real authority because the military ran the whole country",
        "Both officials were legally required to come from the same political party"
      ],
      correct: 1,
      explain: "Two heads of government = constant power tug-of-war. When Hindenburg started using Article 48 a lot in the early 30s, democracy was already on life support before Hitler even arrived."
    },
    {
      q: "When was the Weimar Republic established?",
      options: [
        "At the outbreak of World War I, in August 1914",
        "After the Kaiser abdicated, during 1918–19",
        "During the height of the hyperinflation crisis in 1923",
        "When Hitler was first appointed Chancellor in 1933"
      ],
      correct: 1,
      explain: "The Kaiser abdicated November 1918, the Constitution was drawn up in Weimar (the town) in 1919 — Berlin was too unstable thanks to the Spartacist uprising."
    },
    {
      q: "Which Treaty of Versailles term caused the most anger in Germany?",
      options: [
        "The ban on German citizens travelling abroad without special permits",
        "Article 231, the 'War Guilt clause', forcing Germany to accept full blame",
        "The requirement that all German schools teach French as a first language",
        "The forced conversion of German factories into French-owned businesses"
      ],
      correct: 1,
      explain: "The War Guilt clause was the emotional gut-punch. Reparations hurt the wallet, but Article 231 hurt national pride — and that's what fuelled extremists for the next 20 years."
    },
    {
      q: "How much was Germany ordered to pay in reparations under Versailles?",
      options: [
        "£66 million, paid in monthly instalments over five years",
        "£660 million, payable directly to France and Belgium only",
        "£6.6 billion — an astronomical sum for a defeated nation",
        "£66 billion, though most of it was quietly cancelled in 1920"
      ],
      correct: 2,
      explain: "£6.6 billion — astronomical for 1921. Germany paid one instalment, then said 'nope' in 1923. Cue the French rolling tanks into the Ruhr."
    },
    {
      q: "Who led the Spartacist uprising in January 1919?",
      options: [
        "Adolf Hitler and Hermann Göring, leading a right-wing militia group",
        "Karl Liebknecht and Rosa Luxemburg, attempting a communist revolution",
        "Friedrich Ebert and Gustav Stresemann, defending the new constitution",
        "Wolfgang Kapp and Erich Ludendorff, marching with former army soldiers"
      ],
      correct: 1,
      explain: "Liebknecht and Luxemburg — communists trying to copy the Russian Revolution. The Freikorps crushed them and murdered both leaders. Brutal start to the Republic."
    },
    {
      q: "What was the Kapp Putsch (1920)?",
      options: [
        "A communist takeover of Berlin's factories that lasted three full weeks",
        "A right-wing coup attempt, defeated when Berlin's workers went on general strike",
        "Hitler's first failed attempt to seize control of the Bavarian government",
        "A French-backed invasion of the Ruhr industrial region to seize coal supplies"
      ],
      correct: 1,
      explain: "Wolfgang Kapp + Freikorps marched on Berlin. The army refused to fight them, but Berlin's workers went on strike — turned the lights off, basically. Kapp gave up after 4 days."
    },
    {
      q: "Why did France and Belgium occupy the Ruhr in 1923?",
      options: [
        "Germany had launched a surprise military attack on French border towns",
        "Germany stopped paying reparations, so France seized the industrial heartland",
        "France wanted to help German factories rebuild their production capacity",
        "France was trying to prevent a communist revolution from spreading westward"
      ],
      correct: 1,
      explain: "Germany missed reparations. France went 'fine, we'll take it ourselves' and seized the Ruhr industrial heartland. German workers passive-resisted. Factories ground to a halt."
    },
    {
      q: "What caused the hyperinflation crisis of 1923?",
      options: [
        "Too many British tourists spending pounds in German cities and shops",
        "The government printed massive amounts of money to pay striking workers",
        "A catastrophic wheat shortage following two years of flooding and drought",
        "Stresemann accidentally doubled all taxes on businesses and households"
      ],
      correct: 1,
      explain: "Print money → pay workers → prices skyrocket. By late 1923 a loaf of bread cost 200 BILLION marks. People burnt cash for warmth — it was cheaper than firewood."
    },
    {
      q: "Who actually BENEFITED from hyperinflation?",
      options: [
        "Pensioners living on fixed incomes from government payments each month",
        "People with savings accounts, who'd been carefully investing for years",
        "People who owed debts — they paid them off using worthless banknotes",
        "Civil servants on fixed wages who received the same pay regardless"
      ],
      correct: 2,
      explain: "Owed someone a million marks? Pay them with a single now-worthless note. Debts vanished. But pensioners and savers? Wiped out. Created lasting bitterness toward Weimar."
    },
    {
      q: "What did Gustav Stresemann do to fix hyperinflation in late 1923?",
      options: [
        "He banned all use of paper money for six months across the whole country",
        "He introduced the Rentenmark, a new currency backed by German property",
        "He begged Britain to lend Germany £100 million in emergency gold reserves",
        "He made gold coins the only legal form of currency in German-held territory"
      ],
      correct: 1,
      explain: "The Rentenmark — backed by German land/industry, not gold. A confidence trick really, but it WORKED. Inflation stopped almost overnight. Stresemann is the unsung hero of Weimar."
    },
    {
      q: "What was the Dawes Plan (1924)?",
      options: [
        "Germany received US loans and reparation payments were spread out over more years",
        "Germany's reparations were completely cancelled by the Allied powers forever",
        "The League of Nations took direct control of all major German banking operations",
        "Germany was finally allowed to rebuild its army to pre-war strength and numbers"
      ],
      correct: 0,
      explain: "American banker Charles Dawes basically said 'let's make this manageable.' US loans flooded in, reparations payments were eased, German economy boomed. Until 1929 ruined it all."
    },
    {
      q: "Which 1925 agreement saw Germany accept its western borders with France and Belgium?",
      options: [
        "The original Treaty of Versailles, signed under protest at the Paris conference",
        "The Locarno Treaties, a major diplomatic success negotiated by Stresemann",
        "The Kellogg-Briand Pact, a multinational agreement to outlaw all future wars",
        "The Dawes Plan, which linked border acceptance to American financial support"
      ],
      correct: 1,
      explain: "Locarno = Stresemann's diplomatic masterpiece. Germany voluntarily accepting Versailles borders made the world breathe again. Got Germany into the League of Nations a year later."
    },
    {
      q: "What was the Kellogg-Briand Pact (1928)?",
      options: [
        "An agreement between Germany and the USA to share new industrial technology",
        "A pact where 62 nations agreed to renounce war as a way of solving disputes",
        "A secret trade deal giving Germany cheap access to American raw materials",
        "A military alliance formed by European nations to defend against the Soviets"
      ],
      correct: 1,
      explain: "Big idealistic 'no more war' agreement. Obviously didn't last — but it showed Germany was being treated as a respectable global player again under Stresemann."
    },
    {
      q: "Why was the Weimar economic recovery (1924–29) actually fragile?",
      options: [
        "It was built on short-term American loans that could be recalled at any time",

/* ==========================================================
   STATE & STORAGE
   ========================================================== */
const STORAGE_KEY = 'history-mock-mode-v1';
const state = { currentRound: null, questions: [], qIndex: 0, score: 0, answered: false, shuffledCorrect: 0 };

function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveScores(scores) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(scores)); } catch {}
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getQuestionsForRound(round) {
  if (round.isBoss) {
    const all = [];
    Object.values(QUESTION_BANK).forEach(arr => all.push(...arr));
    return shuffle(all).slice(0, round.count);
  }
  return shuffle(QUESTION_BANK[round.id]).slice(0, round.count);
}

/* ==========================================================
   OPTION SHUFFLER — randomises A/B/C/D order every render
   ========================================================== */
function shuffleOptions(options, correctIndex) {
  const indices = [0, 1, 2, 3];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  return {
    options: indices.map(i => options[i]),
    correctShuffled: indices.indexOf(correctIndex)
  };
}

/* ==========================================================
   HOME SCREEN
   ========================================================== */
function renderHome() {
  const grid = document.getElementById('rounds-grid');
  const scores = loadScores();
  grid.innerHTML = '';

  ROUNDS.forEach(round => {
    const best = scores[round.id] || 0;
    const card = document.createElement('div');
    card.className = 'round-card' + (round.isBoss ? ' boss' : '');
    card.innerHTML = `
      <div class="round-header">
        <div><div class="round-title">${round.title}</div></div>
        <div class="round-icon">${round.icon}</div>
      </div>
      <div class="round-desc">${round.desc}</div>
      <div class="round-meta">
        <span>${round.count} QUESTIONS</span>
        <span class="best-score">${best > 0 ? `BEST: ${best}/${round.count}` : 'NEW'}</span>
      </div>
    `;
    card.addEventListener('click', () => startRound(round));
    grid.appendChild(card);
  });
}

/* ==========================================================
   QUESTION FLOW
   ========================================================== */
function startRound(round) {
  state.currentRound = round;
  state.questions = getQuestionsForRound(round);
  state.qIndex = 0;
  state.score = 0;
  state.answered = false;
  showScreen('question-screen');
  renderQuestion();
}

function renderQuestion() {
  state.answered = false;
  const q = state.questions[state.qIndex];
  document.getElementById('q-round-name').textContent = `${state.currentRound.icon} ${state.currentRound.title}`;
  document.getElementById('q-progress-text').textContent = `${state.qIndex + 1} / ${state.questions.length}`;
  document.getElementById('progress-fill').style.width = `${(state.qIndex / state.questions.length) * 100}%`;
  document.getElementById('question-box').textContent = q.q;

  // Shuffle option order every render
  const shuffled = shuffleOptions(q.options, q.correct);
  state.shuffledCorrect = shuffled.correctShuffled;

  const optsContainer = document.getElementById('options-container');
  optsContainer.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  shuffled.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => handleAnswer(i, btn));
    optsContainer.appendChild(btn);
  });

  const feedback = document.getElementById('feedback');
  feedback.className = 'feedback';
  document.getElementById('next-btn').className = 'next-btn';
}

function handleAnswer(choice) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.qIndex];
  const correctIdx = state.shuffledCorrect;
  const correct = choice === correctIdx;
  const allButtons = document.querySelectorAll('.option');

  allButtons.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct');
    else if (i === choice) b.classList.add('wrong');
  });

  const feedback = document.getElementById('feedback');
  const feedbackTitle = document.getElementById('feedback-title');
  const feedbackText = document.getElementById('feedback-text');

  if (correct) {
    state.score++;
    feedbackTitle.textContent = '✓ NAILED IT';
    feedback.classList.add('correct');
  } else {
    feedbackTitle.textContent = '✗ NOT QUITE';
    feedback.classList.add('wrong');
  }
  feedbackText.textContent = q.explain;
  feedback.classList.add('show');

  document.getElementById('progress-fill').style.width = `${((state.qIndex + 1) / state.questions.length) * 100}%`;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = state.qIndex === state.questions.length - 1 ? 'SEE RESULTS →' : 'NEXT →';
  nextBtn.classList.add('show');
}

document.getElementById('next-btn').addEventListener('click', () => {
  state.qIndex++;
  if (state.qIndex >= state.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
});

/* ==========================================================
   RESULTS SCREEN
   ========================================================== */
function showResults() {
  showScreen('results-screen');
  const total = state.questions.length;
  const score = state.score;
  const pct = (score / total) * 100;

  document.getElementById('results-round-name').textContent = `${state.currentRound.icon} ${state.currentRound.title}`;
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-total').textContent = `/ ${total}`;

  let msg, sub;
  if (pct === 100) { msg = '⚜ FLAWLESS VICTORY ⚜'; sub = 'Untouchable. The history books bow to you.'; }
  else if (pct >= 80) { msg = '🔥 ABSOLUTELY COOKING'; sub = 'Clean run. One more loop to make it stick forever.'; }
  else if (pct >= 60) { msg = '⚔️ STRONG SHOWING'; sub = 'Solid base. The wobbles are exactly what to revisit.'; }
  else if (pct >= 40) { msg = '🎯 GETTING THERE'; sub = 'Not bad. Every miss just turned into a study cue.'; }
  else { msg = '📜 EARLY DAYS'; sub = 'No stress. The empire wasn\'t built in a day. Run it again.'; }

  document.getElementById('score-message').textContent = msg;
  document.getElementById('score-sub').textContent = sub;

  const scores = loadScores();
  const oldBest = scores[state.currentRound.id] || 0;
  const newBestEl = document.getElementById('new-best');
  if (score > oldBest) {
    scores[state.currentRound.id] = score;
    saveScores(scores);
    newBestEl.style.display = 'block';
  } else {
    newBestEl.style.display = 'none';
  }
}

document.getElementById('play-again-btn').addEventListener('click', () => {
  startRound(state.currentRound);
});
document.getElementById('back-home-btn').addEventListener('click', () => {
  showScreen('home-screen');
  renderHome();
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

renderHome();
</script>
</body>
</html>
